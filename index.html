<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOFÉ — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --black: #000000;
      --white: #ffffff;
      --grey: #f5f5f5;
      --mid-grey: #c8c8c8;
      --light-text: #888888;
      --border: rgba(0,0,0,0.12);
      --transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    html, body {
      height: 100%;
      background-color: var(--white);
      color: var(--black);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* PAGE WRAPPER */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards;
      animation-delay: 0.2s;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* CARD */
    .card {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* TOP RULE */
    .rule-top {
      width: 100%;
      height: 1px;
      background: var(--black);
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeIn 0.8s ease forwards;
      animation-delay: 0.6s;
    }

    /* LOGO */
    .logo-wrap {
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeIn 0.9s ease forwards;
      animation-delay: 0.8s;
    }

    .logo-wrap img {
      width: 180px;
      max-width: 100%;
      display: block;
      /* Invert white logo on white bg — logo is white-on-black */
    }

    /* THIN DIVIDER */
    .divider {
      width: 40px;
      height: 1px;
      background: var(--mid-grey);
      margin: 0 auto 36px;
      opacity: 0;
      animation: fadeIn 0.8s ease forwards;
      animation-delay: 1s;
    }

    .logo-wrap a {
      display: block;
      cursor: pointer;
    }

    .logo-wrap a img {
      transition: opacity 0.3s ease;
    }

    .logo-wrap a:hover img {
      opacity: 0.75;
    }

    /* HEADLINE */
    .headline {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(1.6rem, 4vw, 2.1rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.3;
      margin-bottom: 18px;
      opacity: 0;
      animation: fadeIn 0.9s ease forwards;
      animation-delay: 1.1s;
    }

    /* SUBTEXT */
    .subtext {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 0.82rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #444444;
      text-align: center;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeIn 0.9s ease forwards;
      animation-delay: 1.3s;
    }

    /* FORM */
    .form-wrap {
      width: 100%;
      opacity: 0;
      animation: fadeIn 0.9s ease forwards;
      animation-delay: 1.5s;
    }

    .input-row {
      display: flex;
      gap: 0;
      width: 100%;
      border: 1px solid var(--black);
    }

    .email-input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      padding: 14px 18px;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      color: var(--black);
      transition: background var(--transition);
    }

    .email-input::placeholder {
      color: var(--mid-grey);
      letter-spacing: 0.15em;
      font-size: 0.72rem;
      text-transform: uppercase;
    }

    .email-input:focus {
      background: var(--grey);
    }

    .submit-btn {
      border: none;
      border-left: 1px solid var(--black);
      background: var(--black);
      color: var(--white);
      padding: 14px 22px;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      transition: background var(--transition), color var(--transition);
    }

    .submit-btn:hover {
      background: #c9b99a;
      color: var(--white);
      border-left-color: #c9b99a;
    }

    .submit-btn:active {
      opacity: 0.7;
    }

    /* SUCCESS MESSAGE */
    .success-msg {
      display: none;
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1rem;
      letter-spacing: 0.1em;
      color: var(--black);
      font-style: italic;
      padding: 18px 0 4px;
      animation: fadeIn 0.7s ease forwards;
    }

    /* BOTTOM RULE + TAGLINE */
    .bottom-section {
      width: 100%;
      margin-top: 48px;
      opacity: 0;
      animation: fadeIn 0.8s ease forwards;
      animation-delay: 1.7s;
    }

    .rule-bottom {
      width: 100%;
      height: 1px;
      background: var(--black);
      margin-bottom: 20px;
    }

    .tagline {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--mid-grey);
      text-align: center;
    }

    /* RESPONSIVE */
    @media (max-width: 480px) {
      .page { padding: 48px 20px; }
      .logo-wrap img { width: 150px; }
      .input-row { flex-direction: column; border: none; gap: 10px; }
      .email-input {
        border: 1px solid var(--black);
        padding: 13px 16px;
      }
      .submit-btn {
        border: 1px solid var(--black);
        padding: 14px;
        text-align: center;
      }
    }
  </style>
</head>

      <div class="divider"></div>

      <!-- HEADLINE -->
      <h1 class="headline">Website Coming Soon</h1>

      <!-- SUBTEXT -->
      <p class="subtext">Be the first to know when we launch.</p>

      <!-- FORM -->
      <div class="form-wrap">
        <form id='notifyForm' method='POST' name='notify'>
          <input type="hidden" name="form-name" value="notify" />
          <p style="display:none"><label>Don't fill this: <input name="bot-field" /></label></p>
          <div class="input-row" id="inputRow">
            <input
              class="email-input"
              type="email"
              name="email"
              id="emailInput"
              placeholder="Your email address"
              autocomplete="email"
            />
            <button type="submit" class="submit-btn" id="submitBtn">
              Notify Me
            </button>
          </div>
        </form>
        <p class="success-msg" id="successMsg">
          Thank you. We'll notify you when we launch.
        </p>
      </div>

      <!-- BOTTOM -->
      <div class="bottom-section">
        <div class="rule-bottom"></div>
      </div>

    </div>
  </div>

  <script>
    const form = document.getElementById('notifyForm');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();

      const input = document.getElementById('emailInput');
      const btn = document.getElementById('submitBtn');
      const row = document.getElementById('inputRow');
      const msg = document.getElementById('successMsg');
      const email = input.value.trim();

      if (!email || !email.includes('@')) {
        input.style.borderColor = '#999';
        input.focus();
        setTimeout(() => { input.style.borderColor = ''; }, 1200);
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        const response = await fetch('/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams(new FormData(form)).toString(),
        });

        if (response.ok) {
          // Success state
          row.style.opacity = '0';
          row.style.transition = 'opacity 0.4s ease';
          setTimeout(() => {
            row.style.display = 'none';
            msg.style.display = 'block';
          }, 400);
        } else {
          btn.disabled = false;
          btn.textContent = 'Notify Me';
        }
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Notify Me';
      }
    });
  </script>
